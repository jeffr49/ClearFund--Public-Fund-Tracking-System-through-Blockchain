<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearFund - Public Transparency Portal</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        <aside class="role-sidebar" id="roleSidebar">
            <!-- Sidebar injected via JS -->
        </aside>

        <div class="main-content">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa-link"></i> ClearFund
            </div>
            <div class="nav-controls">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search projects by name or keyword...">
                </div>
            </div>
        </div>
        <div class="filters-bar">
            <div class="nav-container filter-container">
                <div class="filter-input-group" style="position:relative;">
                    <i class="fa-solid fa-location-crosshairs"></i>
                    <input type="text" id="filterLocation" class="filter-input" placeholder="Type location..." autocomplete="off">
                    <ul class="location-suggestions" id="locationSuggestions"></ul>
                </div>
                <div class="filter-slider-group">
                    <label for="filterBudget">Max Budget: <span id="budgetValue">All</span></label>
                    <input type="range" id="filterBudget" class="filter-slider" min="0" max="10000000" step="500000" value="10000000">
                </div>
                <select id="filterStatus" class="filter-select">
                    <option value="">All Statuses</option>
                    <option value="ongoing">Ongoing</option>
                    <option value="bidding">Bidding</option>
                    <option value="completed">Completed</option>
                </select>
                <select id="filterCategory" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="Transport">Transport</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Education">Education</option>
                    <option value="Energy">Energy</option>
                    <option value="Telecom">Telecom</option>
                    <option value="Environment">Environment</option>
                    <option value="Public Utility">Public Utility</option>
                </select>
                <select id="filterDept" class="filter-select">
                    <option value="">All Departments</option>
                    <option value="Ministry of Road Transport">Road Transport</option>
                    <option value="Dept of Water Supply">Water Supply</option>
                    <option value="Ministry of Health">Health</option>
                    <option value="Ministry of Urban Dev">Urban Dev</option>
                    <option value="Ministry of Renewable Energy">Renewable Energy</option>
                    <option value="Dept of Telecommunications">Telecommunications</option>
                    <option value="Ministry of Education">Education</option>
                    <option value="Traffic Police Dept">Traffic Police</option>
                    <option value="Ministry of Environment">Environment</option>
                    <option value="Dept of Culture">Culture</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <header class="page-header">
            <h1>Public Projects Ledger</h1>
            <p>Real-time blockchain-verified tracking of public funds and project milestones.</p>
        </header>

        <!-- Stats bar -->
        <div class="stats-bar" id="statsBar"></div>

        <!-- Map -->
        <div class="map-wrapper">
            <div id="map" class="map-container"></div>
            <div class="map-legend">
                <div class="legend-item"><span class="legend-dot ongoing"></span> Ongoing</div>
                <div class="legend-item"><span class="legend-dot bidding"></span> Bidding</div>
                <div class="legend-item"><span class="legend-dot completed"></span> Completed</div>
            </div>
        </div>

        <!-- Project count -->
        <div class="results-row">
            <p id="projectCount" class="project-count"></p>
        </div>

        <div class="project-grid" id="projectGrid">
            <!-- Project cards injected via JS -->
        </div>
    </main>
        </div><!-- End main content -->
    </div><!-- End app layout -->

    <!-- Modal for Project Details -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-container">
            <button class="modal-close" id="closeModal">&times;</button>
            <div class="modal-content" id="modalContent">
                <!-- details injected via JS -->
            </div>
        </div>
    </div>

    <!-- Leaflet JS for Map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
